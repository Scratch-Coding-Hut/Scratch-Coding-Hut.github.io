name: Deploy Scratch-Coding-Hut to GitHub Pages

on:
  schedule:
    - cron: "*/1 * * * *"  # Deploy every minute
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Clone Scratch-Coding-Hut repo
      - name: Clone Scratch-Coding-Hut repository
        run: |
          git clone -b main https://github.com/Scratch-Coding-Hut/Scratch-Coding-Hut.git
          echo "✅ Clone completed. Listing directory:"
          ls -R Scratch-Coding-Hut

      # Step 2: Verify that src folder exists
      - name: Verify src path
        run: |
          if [ -d "Scratch-Coding-Hut/src" ]; then
            echo "✅ src folder found!"
          else
            echo "❌ src folder NOT found!"
            exit 1
          fi

      # Step 3: Checkout scratch-coding-hut.github.io for deployment
      - name: Checkout scratch-coding-hut.github.io
        uses: actions/checkout@v4
        with:
          ref: gh-pages

      # Step 4: Sync content from Scratch-Coding-Hut/src to current repo
      - name: Copy src contents
        run: |
          rm -rf ./*  # Clean up old content
          cp -r Scratch-Coding-Hut/src/. .
          echo "✅ Copied src content. Listing:"
          ls -R .

      # Step 5: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          git add .
          git commit -m "🚀 Deploy to GitHub Pages" || echo "No changes to commit"
          git push --force origin gh-pages
