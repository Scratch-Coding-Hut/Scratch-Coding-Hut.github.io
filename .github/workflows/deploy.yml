name: Deploy to GitHub Pages Every Minute

on:
  # Trigger every minute using cron
  schedule:
    - cron: "*/1 * * * *"  # Every minute
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Single deploy job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the scratch-coding-hut.github.io repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Clone the Scratch-Coding-Hut repository
      - name: Clone Scratch-Coding-Hut repository
        run: |
          echo "::group::Cloning Scratch-Coding-Hut repository"
          git clone https://github.com/Scratch-Coding-Hut/Scratch-Coding-Hut.git --depth=1
          echo "::endgroup::"

      # Step 3: Check contents of the cloned repository
      - name: List contents of the cloned Scratch-Coding-Hut repository
        run: |
          echo "Listing contents of Scratch-Coding-Hut repository:"
          ls -la Scratch-Coding-Hut/
          echo "Listing contents of the src directory:"
          ls -la Scratch-Coding-Hut/src/

      # Step 4: Ensure src is a directory
      - name: Check src directory
        run: |
          if [ ! -d "Scratch-Coding-Hut/src" ]; then
            echo "❌ src directory not found!"
            exit 1
          fi
          echo "✅ src directory exists!"

      # Step 5: Copy src contents to root
      - name: Copy src contents
        run: |
          echo "✅ src is a directory, copying contents to root..."
          rm -rf ./*  # Clean up old content
          cp -r Scratch-Coding-Hut/src/. .
          echo "✅ Copied src content. Listing:"
          ls -la

      # Step 6: Setup Git for deployment
      - name: Setup Git for deployment
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git checkout --orphan gh-pages  # Create or switch to gh-pages branch
          git reset --hard  # Remove all files from git history

      # Step 7: Commit and deploy to GitHub Pages
      - name: Commit and Deploy to GitHub Pages
        run: |
          git add .
          git commit -m "Deploy to GitHub Pages"
          git push --force origin gh-pages
          
      # Step 8: Confirm deployment
      - name: Confirm Deployment
        run: |
          echo "✅ Deployment completed successfully!"
