name: Deploy to GitHub Pages Every Minute

on:
  # Trigger every minute using cron
  schedule:
    - cron: "*/1 * * * *"  # Every minute

  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the scratch-coding-hut.github.io repository
      - name: Checkout scratch-coding-hut.github.io repository
        uses: actions/checkout@v4

      # Step 2: Clone the Scratch-Coding-Hut repository
      - name: Clone Scratch-Coding-Hut repository
        run: |
          git clone https://github.com/Scratch-Coding-Hut/Scratch-Coding-Hut.git
          echo "Cloned repository contents:"
          ls -R Scratch-Coding-Hut

      # Step 3: Verify src directory and copy its contents
      - name: Check and copy src directory
        run: |
          # Ensure the src directory exists
          if [ ! -d "Scratch-Coding-Hut/src" ]; then
            echo "Error: src directory not found in Scratch-Coding-Hut!"
            exit 1
          fi

          # Clean up old content and copy src directory
          rm -rf *
          cp -r Scratch-Coding-Hut/src/* .

      # Step 4: Deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        run: |
          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Switch to gh-pages branch, create it if necessary
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi

          # Remove all files and copy src content
          git rm -rf . > /dev/null 2>&1 || true
          cp -r Scratch-Coding-Hut/src/* .

          # Commit and push changes
          git add .
          git commit -m "Deploy src directory to GitHub Pages"

          # Force push to gh-pages branch
          git push --force origin gh-pages
