name: Deploy to GitHub Pages Every Minute

on:
  # Trigger every minute using cron
  schedule:
    - cron: "*/1 * * * *"  # Every minute
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the scratch-coding-hut.github.io repository (where the content will be deployed)
      - name: Checkout scratch-coding-hut.github.io repository
        uses: actions/checkout@v4

      # Step 2: Clone the Scratch-Coding-Hut repository
      - name: Clone Scratch-Coding-Hut repository
        run: |
          git clone https://github.com/Scratch-Coding-Hut/Scratch-Coding-Hut.git
          cd Scratch-Coding-Hut

      # Step 3: Check the repo structure and deploy content to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        run: |
          # List files in the cloned Scratch-Coding-Hut repo for debugging
          echo "Listing files in the Scratch-Coding-Hut repository:"
          ls -R

          # Check if src directory exists in Scratch-Coding-Hut repo
          if [ ! -d "src" ]; then
            echo "src directory not found in Scratch-Coding-Hut repository!"
            exit 1
          fi

          # Setup Git for deployment
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Create a new gh-pages branch if not already existing
          git checkout --orphan gh-pages

          # Remove all files from the current working tree
          git reset --hard

          # Copy everything from the src directory in the Scratch-Coding-Hut repo to the root of the gh-pages branch
          cp -r Scratch-Coding-Hut/src/* .

          # Commit the changes
          git add .
          git commit -m "Deploy to GitHub Pages from Scratch-Coding-Hut repository"

          # Push the changes to the gh-pages branch
          git push --force origin gh-pages
