name: Deploy to GitHub Pages Every Minute

on:
  # Trigger every minute using cron
  schedule:
    - cron: "*/1 * * * *"  # Every minute
  
  # Allow manual trigger from the Actions tab
  workflow_dispatch:

# Set permissions for the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: write
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping queued runs while another is running
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the scratch-coding-hut.github.io repository (for deployment)
      - name: Checkout scratch-coding-hut.github.io repository
        uses: actions/checkout@v4
      
      # Step 2: Clone the Scratch-Coding-Hut repository
      - name: Clone Scratch-Coding-Hut repository
        run: |
          git clone https://github.com/Scratch-Coding-Hut/Scratch-Coding-Hut.git
          cd Scratch-Coding-Hut
          ls -R

      # Step 3: Check if src FILE exists and deploy to GitHub Pages
      - name: Deploy to GitHub Pages
        id: deployment
        run: |
          # Check if src file exists
          if [ ! -f "Scratch-Coding-Hut/src" ]; then
            echo "Error: src file not found in Scratch-Coding-Hut repository!"
            exit 1
          fi

          # Configure Git
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

          # Switch to gh-pages branch, create it if necessary
          if git ls-remote --heads origin gh-pages | grep -q gh-pages; then
            git checkout gh-pages
          else
            git checkout --orphan gh-pages
          fi
          
          # Remove all files from the current working tree
          git rm -rf . > /dev/null 2>&1 || true
          
          # Copy src file from the Scratch-Coding-Hut repo to root
          cp Scratch-Coding-Hut/src .

          # Commit and push changes
          git add src
          git commit -m "Deploy src file to GitHub Pages"
          
          # Push to gh-pages branch
          git push --force origin gh-pages
